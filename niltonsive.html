<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE | NEXUS SIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-heavy { font-family: 'Archivo Black', sans-serif; }
        .glass-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 280px; height: 60px; background: rgba(15, 15, 15, 0.8); 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 999px; display: flex; justify-content: space-around; 
            align-items: center; z-index: 1000; 
        }
        #modal-cart { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.96); backdrop-filter: blur(10px); 
            z-index: 5000; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body>

    <div id="intro-overlay" class="fixed inset-0 bg-black z-[6000] flex flex-col items-center justify-center transition-opacity duration-1000">
        <img src="ei_1776150431404-removebg-preview.png" alt="NEXUS" class="w-32 animate-pulse mb-6">
        <h2 id="typewriter" class="text-[10px] tracking-[0.5em] uppercase text-zinc-600 italic font-light"></h2>
    </div>

    <header class="p-8 pt-16 max-w-4xl mx-auto">
        <img src="ei_1776150431404-removebg-preview.png" class="w-28 mb-10">
        <input type="text" id="search-input" oninput="searchProducts()" placeholder="PROCURAR ARTIGO..." class="w-full bg-zinc-950 border border-zinc-900 p-5 rounded-2xl text-[10px] uppercase font-black tracking-widest outline-none focus:border-red-900 transition text-white">
    </header>

    <main class="max-w-4xl mx-auto px-8 pb-40">
        <h2 class="text-3xl font-heavy italic tracking-tighter text-red-700 uppercase mb-8" data-aos="fade-right">Drops</h2>
        <div id="product-list" class="grid grid-cols-1 gap-8"></div>
    </main>

    <nav class="glass-nav">
        <a href="#" class="text-[9px] font-black tracking-widest opacity-40 hover:opacity-100 transition">HOME</a>
        <button onclick="toggleCart()" class="relative">
            <span class="text-[9px] font-black tracking-widest text-red-600">BAG</span>
            <div id="cart-dot" class="absolute -top-2 -right-2 w-2 h-2 bg-white rounded-full hidden"></div>
        </button>
        <a href="https://wa.me/258879151175" target="_blank" class="text-[9px] font-black tracking-widest opacity-40 hover:opacity-100 transition">CHAT</a>
    </nav>

    <!-- MODAL BAG -->
    <div id="modal-cart">
        <div class="bg-[#080808] border border-red-900/20 w-[92%] max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-heavy italic text-white uppercase tracking-tighter">Sua Bag</h2>
                <button onclick="toggleCart()" class="text-zinc-500 text-xs font-black uppercase">Fechar</button>
            </div>
            <div id="cartItems" class="max-h-48 overflow-y-auto mb-6 space-y-3"></div>
            <div class="space-y-4 border-t border-zinc-900 pt-6">
                <input type="tel" id="phone" placeholder="TEU CONTACTO" class="w-full bg-zinc-950 border border-zinc-900 text-white p-4 rounded-2xl outline-none text-xs font-bold">
                <button onclick="sendOrder()" class="w-full bg-red-700 text-white font-black py-5 rounded-2xl text-[10px] uppercase tracking-[0.2em]">Finalizar no WhatsApp</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtqANWxSTLOK8K-yLTiTwviDofzLheGxA",
            authDomain: "nexus-sive.firebaseapp.com",
            projectId: "nexus-sive",
            storageBucket: "nexus-sive.firebasestorage.app",
            databaseURL: "https://nexus-sive-default-rtdb.firebaseio.com/",
            messagingSenderId: "450142731292",
            appId: "1:450142731292:web:5685cf69f350c34bcc33d9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let productsDB = [];
        let bag = JSON.parse(localStorage.getItem("nexus_bag")) || [];

        function loadProducts() {
            database.ref('produtos').on('value', (snapshot) => {
                const data = snapshot.val();
                productsDB = data ? Object.values(data) : [];
                renderProducts(productsDB);
            });
        }

        function renderProducts(data) {
            const list = document.getElementById("product-list");
            if (data.length === 0) {
                list.innerHTML = `<p class="text-center opacity-20 uppercase font-heavy">Vazio</p>`;
                return;
            }
            list.innerHTML = data.reverse().map((p) => `
                <div class="product-card" data-aos="fade-up">
                    <div class="aspect-square bg-zinc-950 border border-zinc-900 rounded-[2.5rem] overflow-hidden mb-6">
                        <img src="${p.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex justify-between items-start mb-6 px-2">
                        <div><h3 class="text-2xl font-heavy italic uppercase mb-1">${p.name}</h3><p class="text-zinc-500 text-[9px] uppercase font-bold tracking-widest">${p.desc}</p></div>
                        <span class="text-xl font-black text-red-700">${p.price} MT</span>
                    </div>
                    <button onclick="addToBag('${p.id}')" class="w-full bg-white text-black font-black py-5 rounded-2xl text-[9px] uppercase hover:bg-red-800 hover:text-white transition-all">Adicionar à Bag</button>
                </div>`).join("");
        }

        function addToBag(id) {
            const product = productsDB.find(p => p.id == id);
            if(product) {
                bag.push(product);
                localStorage.setItem("nexus_bag", JSON.stringify(bag));
                document.getElementById("cart-dot").classList.remove("hidden");
                updateCartUI();
            }
        }

        function toggleCart() {
            const modal = document.getElementById("modal-cart");
            modal.style.display = (modal.style.display === "flex") ? "none" : "flex";
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById("cartItems");
            container.innerHTML = bag.map((item, i) => `
                <div class="flex justify-between items-center bg-zinc-900/20 p-4 rounded-2xl border border-white/5">
                    <div><p class="font-black text-white uppercase text-[9px]">${item.name}</p><p class="text-red-700 font-black text-[10px]">${item.price} MT</p></div>
                    <button onclick="removeFromBag(${i})" class="text-[8px] font-black text-zinc-500 uppercase">Remover</button>
                </div>`).join("");
        }

        function removeFromBag(i) {
            bag.splice(i, 1);
            localStorage.setItem("nexus_bag", JSON.stringify(bag));
            updateCartUI();
            if(bag.length === 0) document.getElementById("cart-dot").classList.add("hidden");
        }

        function sendOrder() {
            const phone = document.getElementById("phone").value;
            if (bag.length === 0 || !phone) return alert("Adicione itens e seu contacto!");
            let msg = `*PEDIDO NEXUS SIVE*%0A%0A`;
            bag.forEach(item => msg += `- ${item.name}: ${item.price} MT%0A`);
            msg += `%0A*Contacto:* ${phone}`;
            window.location.href = `https://wa.me/258879151175?text=${msg}`;
        }

        window.onload = () => {
            AOS.init({ duration: 1000, once: true });
            loadProducts();
            if(bag.length > 0) document.getElementById("cart-dot").classList.remove("hidden");
        };
    </script>
</body>
</html>
