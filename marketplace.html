<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKETPLACE | NEXUS SIVE</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-heavy { font-family: 'Archivo Black', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #8B0000; border-radius: 10px; }
        
        .glass-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 280px; height: 60px; background: rgba(15, 15, 15, 0.8); 
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 999px; display: flex; justify-content: space-around; 
            align-items: center; z-index: 1000; 
        }

        #modal-cart { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.96); backdrop-filter: blur(10px); 
            z-index: 5000; align-items: center; justify-content: center; 
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- LOADING INTRO -->
    <div id="intro-overlay" class="fixed inset-0 bg-black z-[6000] flex flex-col items-center justify-center transition-opacity duration-1000">
        <img src="ei_1776150431404-removebg-preview.png" alt="NEXUS" class="w-32 animate-pulse mb-6">
        <h2 id="typewriter" class="text-[10px] tracking-[0.5em] uppercase text-zinc-600 italic font-light"></h2>
    </div>

    <header class="p-8 pt-16 max-w-4xl mx-auto">
        <img src="ei_1776150431404-removebg-preview.png" class="w-28 mb-10 cursor-pointer">
        <input type="text" id="search-input" oninput="searchProducts()" placeholder="PROCURAR ARTIGO..." class="w-full bg-zinc-950 border border-zinc-900 p-5 rounded-2xl text-[10px] uppercase font-black tracking-widest outline-none focus:border-red-900 transition text-white">
    </header>

    <main class="max-w-4xl mx-auto px-8 pb-40">
        <h2 class="text-3xl font-heavy italic tracking-tighter text-red-700 uppercase mb-8" data-aos="fade-right">Drops</h2>
        <!-- Grelha responsiva adicionada -->
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </main>

    <nav class="glass-nav">
        <a href="#" class="text-[9px] font-black tracking-widest opacity-40 hover:opacity-100 transition">HOME</a>
        <button onclick="toggleCart()" class="relative">
            <span class="text-[9px] font-black tracking-widest text-red-600">BAG</span>
            <div id="cart-dot" class="absolute -top-2 -right-2 w-2 h-2 bg-white rounded-full hidden"></div>
        </button>
        <a href="https://wa.me/258879151175" target="_blank" class="text-[9px] font-black tracking-widest opacity-40 hover:opacity-100 transition">CHAT</a>
    </nav>

    <!-- MODAL DA BAG -->
    <div id="modal-cart">
        <div class="bg-[#080808] border border-red-900/20 w-[92%] max-w-md rounded-[2.5rem] p-8 shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-heavy italic text-white uppercase tracking-tighter">Sua Bag</h2>
                <button onclick="toggleCart()" class="text-zinc-500 text-xs font-black uppercase">Fechar</button>
            </div>

            <div id="cartItems" class="max-h-48 overflow-y-auto mb-6 space-y-3 pr-2"></div>

            <div class="space-y-4 border-t border-zinc-900 pt-6">
                <!-- SELEÇÃO DE BAIRROS ATUALIZADA -->
                <div>
                    <label class="text-[9px] font-black text-zinc-500 uppercase ml-1 mb-1 block">Local de Entrega (Matola)</label>
                    <select id="location" class="w-full bg-zinc-950 border border-zinc-900 text-white p-4 rounded-2xl outline-none text-xs font-bold appearance-none">
                        <optgroup label="Matola" class="bg-black">
                            <option value="Malhapsene">Malhapsene</option>
                            <option value="Tchumene">Tchumene</option>
                            <option value="Liberdade">Liberdade</option>
                            <option value="Matola C">Matola C</option>
                            <option value="Matola F">Matola F</option>
                            <option value="Matola G">Matola G</option>
                            <option value="Matola Gare">Matola Gare</option>
                            <option value="Matola J">Matola J</option>
                            <option value="Matola Rio">Matola Rio</option>
                            <option value="Machava">Machava</option>
                            <option value="Singatela">Singatela</option>
                            <option value="Tsalala">Tsalala</option>
                            <option value="Fomento">Fomento</option>
                        </optgroup>
                        <optgroup label="Outras Zonas" class="bg-black">
                            <option value="Cidade de Maputo">Cidade de Maputo</option>
                            <option value="Outra">Outro Local</option>
                        </optgroup>
                    </select>
                </div>

                <input type="tel" id="phone" placeholder="TEU CONTACTO" class="w-full bg-zinc-950 border border-zinc-900 text-white p-4 rounded-2xl outline-none text-xs font-bold">
                
                <button onclick="sendOrder()" class="w-full bg-red-700 text-white font-black py-5 rounded-2xl text-[10px] uppercase tracking-[0.2em] hover:bg-red-600 transition">Finalizar no WhatsApp</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // Produtos predefinidos para inicialização automática
        const defaultProducts = [
            {
                name: "Nexus Core Hoodie",
                desc: "Heavyweight black oversized graphic hoodie",
                price: "3500",
                image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600&auto=format&fit=crop"
            },
            {
                name: "Matrix Cargo Pants",
                desc: "Tactical multi-pocket cargo pants",
                price: "4000",
                image: "https://images.unsplash.com/photo-1517462964-21fdcec3f25b?q=80&w=600&auto=format&fit=crop"
            },
            {
                name: "Cyberpunk Graphic Tee",
                desc: "Premium acid-wash graphic t-shirt",
                price: "1800",
                image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=600&auto=format&fit=crop"
            },
            {
                name: "Nexus Beanie",
                desc: "Ribbed knit classic logo beanie",
                price: "900",
                image: "https://images.unsplash.com/photo-1576871337622-98d48d4aa53e?q=80&w=600&auto=format&fit=crop"
            }
        ];

        let productsDB = JSON.parse(localStorage.getItem("nexus_db"));
        if (!productsDB || productsDB.length === 0) {
            productsDB = defaultProducts;
            localStorage.setItem("nexus_db", JSON.stringify(productsDB));
        }

        let bag = JSON.parse(localStorage.getItem("nexus_bag")) || [];

        function renderProducts(data = productsDB) {
            const list = document.getElementById("product-list");
            if (data.length === 0) {
                list.innerHTML = `<div class="col-span-full py-32 text-center opacity-10"><p class="font-heavy italic uppercase text-3xl">Vazio</p></div>`;
                return;
            }
            list.innerHTML = data.map((p) => {
                // CORREÇÃO: Pega o index real de productsDB para que a busca filtre mas adicione o item certo
                const originalIndex = productsDB.indexOf(p);
                return `
                <div class="product-card" data-aos="fade-up">
                    <div class="aspect-square bg-zinc-950 border border-zinc-900 rounded-[2.5rem] overflow-hidden mb-6">
                        <img src="${p.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex justify-between items-start mb-6 px-2">
                        <div><h3 class="text-2xl font-heavy italic uppercase mb-1 leading-none">${p.name}</h3><p class="text-zinc-500 text-[9px] uppercase font-bold tracking-widest">${p.desc}</p></div>
                        <span class="text-xl font-black text-red-700 whitespace-nowrap">${p.price} MT</span>
                    </div>
                    <button onclick="addToBag(${originalIndex})" class="w-full bg-white text-black font-black py-5 rounded-2xl text-[9px] uppercase hover:bg-red-800 hover:text-white transition-all">Adicionar à Bag</button>
                </div>`;
            }).join("");

            // CORREÇÃO: Atualiza o AOS para animar os novos elementos injetados via JS
            if (typeof AOS !== 'undefined') {
                AOS.refresh();
            }
        }

        function addToBag(index) {
            if (productsDB[index]) {
                bag.push(productsDB[index]);
                localStorage.setItem("nexus_bag", JSON.stringify(bag));
                document.getElementById("cart-dot").classList.remove("hidden");
                updateCartUI();
            }
        }

        function toggleCart() {
            const modal = document.getElementById("modal-cart");
            // CORREÇÃO: Estruturação consistente para exibição/ocultação do modal
            const isHidden = modal.style.display === "none" || modal.style.display === "";
            modal.style.display = isHidden ? "flex" : "none";
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById("cartItems");
            if (bag.length === 0) { 
                container.innerHTML = `<p class="text-center py-6 text-zinc-700 text-[9px] font-black uppercase">Sua bag está vazia</p>`; 
                return; 
            }
            container.innerHTML = bag.map((item, i) => `
                <div class="flex justify-between items-center bg-zinc-900/20 p-4 rounded-2xl border border-white/5">
                    <div><p class="font-black text-white uppercase text-[9px]">${item.name}</p><p class="text-red-700 font-black text-[10px]">${item.price} MT</p></div>
                    <button onclick="removeFromBag(${i})" class="text-[8px] font-black text-zinc-500 uppercase border border-zinc-800 px-3 py-1 rounded-lg">Remover</button>
                </div>`).join("");
        }

        function removeFromBag(i) {
            bag.splice(i, 1);
            localStorage.setItem("nexus_bag", JSON.stringify(bag));
            updateCartUI();
            if(bag.length === 0) document.getElementById("cart-dot").classList.add("hidden");
        }

        function searchProducts() {
            const term = document.getElementById("search-input").value.toLowerCase();
            const filtered = productsDB.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function sendOrder() {
            const phone = document.getElementById("phone").value;
            const loc = document.getElementById("location").value;

            if (bag.length === 0) { alert("Sua bag está vazia!"); return; }
            if (!phone || phone.trim().length < 5) { alert("Insira o seu contacto."); return; }

            let msg = `PEDIDO - NEXUS SIVE\n`;
            msg += `_______________________________\n\n`;
            
            let total = 0;
            bag.forEach((item, i) => {
                msg += `${i + 1}. ${item.name.toUpperCase()} - ${item.price} MT\n`;
                // CORREÇÃO: Expressão regular robusta para extração de preços
                const numericPrice = parseFloat(item.price.toString().replace(/\D/g, '')) || 0;
                total += numericPrice;
            });

            msg += `_______________________________\n\n`;
            msg += `TOTAL: ${total} MT\n`;
            msg += `BAIRRO: ${loc.toUpperCase()}\n`;
            msg += `CONTACTO: ${phone}\n\n`;
            msg += `_Enviado pelo Marketplace Nexus_`;

            // CORREÇÃO: Codifica de forma segura para URL e abre em nova aba/aplicativo externo
            const whatsappUrl = `https://wa.me/258879151175?text=${encodeURIComponent(msg)}`;
            window.open(whatsappUrl, '_blank');
        }

        function startIntro() {
            const slogan = "Small details, big differences.";
            let i = 0;
            const el = document.getElementById("typewriter");
            const timer = setInterval(() => {
                if (i < slogan.length) { el.innerHTML += slogan.charAt(i); i++; } 
                else { clearInterval(timer); setTimeout(() => document.getElementById("intro-overlay").classList.add("opacity-0", "pointer-events-none"), 1000); }
            }, 50);
        }

        window.onload = () => { 
            startIntro(); 
            renderProducts(); 
            if(bag.length > 0) document.getElementById("cart-dot").classList.remove("hidden"); 
        };
    </script>
</body>
</html>
