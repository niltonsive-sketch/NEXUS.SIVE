    <style>
        /* ── BASE ── */
        *, *::before, *::after { box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* ── NOISE ── */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");

        /* ── ADD BUTTON ── */

        .cart-total { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 0.2rem; margin-bottom: 1rem; }

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 900, once: true, offset: 60 });
        /* ════════════════════════════════════════
           SIZES HELPERS
        ════════════════════════════════════════ */
        const ALL_SIZES = ["XS","S","M","L","XL","XXL"];
        /** Gera sizes padrão com stock aleatório se o produto não tiver */
        function ensureSizes(p) {
            if (p.sizes && typeof p.sizes === 'object' && !Array.isArray(p.sizes)) return p;
            if (!p.sizes) {
                // Produto legado — cria stock padrão
                const sizes = {};
                ALL_SIZES.forEach(s => { sizes[s] = Math.floor(Math.random() * 6); });
                p.sizes = sizes;
            }
            return p;
        }
        function totalStock(p) {
            if (!p.sizes) return 0;
            return Object.values(p.sizes).reduce((a, b) => a + b, 0);
        }
        function stockStatus(total) {
            if (total === 0) return 'zero';
            if (total <= 5) return 'low';
            return 'good';
        }
        /* ════════════════════════════════════════
           DATA
        ════════════════════════════════════════ */
        const defaultProducts = [
            {
                name: "Nexus Core Hoodie",
                desc: "Heavyweight black oversized graphic hoodie",
                price: "3500",
                image: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600&auto=format&fit=crop",
                sizes: { XS:0, S:3, M:5, L:4, XL:2, XXL:1 }
            },
            {
                name: "Matrix Cargo Pants",
                desc: "Tactical multi-pocket cargo pants",
                price: "4000",
                image: "https://images.unsplash.com/photo-1517462964-21fdcec3f25b?q=80&w=600&auto=format&fit=crop",
                sizes: { XS:0, S:0, M:3, L:6, XL:4, XXL:2 }
            },
            {
                name: "Cyberpunk Graphic Tee",
                desc: "Premium acid-wash graphic t-shirt",
                price: "1800",
                image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=600&auto=format&fit=crop",
                sizes: { XS:2, S:1, M:0, L:0, XL:0, XXL:0 }
            },
            {
                name: "Nexus Beanie",
                desc: "Ribbed knit classic logo beanie",
                price: "900",
                image: "https://images.unsplash.com/photo-1576871337622-98d48d4aa53e?q=80&w=600&auto=format&fit=crop",
                sizes: { "ONE SIZE": 8 }   // Sem tamanho variável
            }
        ];
        let productsDB = JSON.parse(localStorage.getItem("nexus_db"));
        if (!productsDB || productsDB.length === 0) {
            productsDB = defaultProducts;
            localStorage.setItem("nexus_db", JSON.stringify(productsDB));
        } else {
            // Garante que produtos antigos (sem sizes) têm estrutura correcta
            productsDB = productsDB.map(ensureSizes);
        }
        let bag = JSON.parse(localStorage.getItem("nexus_bag")) || [];
        /* ════════════════════════════════════════
           RENDER SIZES
        ════════════════════════════════════════ */
        function renderSizePills(p, cardIdx) {
            if (!p.sizes) return '';
            const entries = Object.entries(p.sizes);
            if (entries.length === 0) return '';
            const pills = entries.map(([label, stock]) => {
                const oos = stock === 0;
                const low = stock > 0 && stock <= 3;
                const dotClass = oos ? 'stock-zero' : low ? 'stock-low' : 'stock-good';
                return `
                <div class="size-pill ${oos ? 'out-of-stock' : ''}"
                     data-size="${label}"
                     data-card="${cardIdx}"
                     ${oos ? '' : `onclick="selectSize(this, ${cardIdx})"`}
                     title="${oos ? 'Esgotado' : `${stock} unidade${stock !== 1 ? 's' : ''} disponível${stock !== 1 ? 'is' : ''}`}">
                    ${label}
                    <span class="size-stock-dot ${dotClass}"></span>
                </div>`;
            }).join('');
            return `
            <p class="size-label">Tamanho</p>
            <div class="size-grid" id="sizes-${cardIdx}">${pills}</div>`;
        }
        function selectSize(el, cardIdx) {
            // Remove selected de todos os pills do mesmo card
            document.querySelectorAll(`#sizes-${cardIdx} .size-pill`).forEach(p => p.classList.remove('selected'));
            el.classList.add('selected');
            // Activa botão
            const btn = document.querySelector(`[data-add-btn="${cardIdx}"]`);
            if (btn) {
                btn.disabled = false;
                btn.classList.remove('needs-size');
                btn.querySelector('span').textContent = 'Adicionar à Bag';
            }
        }
        /* ════════════════════════════════════════
           RENDER STOCK INFO
        ════════════════════════════════════════ */
        function renderStockInfo(p) {
            const total = totalStock(p);
            const status = stockStatus(total);
            const labels = { good: `${total} unidades`, low: `Últimas ${total} unidades`, zero: 'Esgotado' };
            const colors = { good: 'good', low: 'low', zero: 'zero' };
            const dots   = { good: '#2ecc71', low: '#e67e22', zero: '#555' };
            return `
            <div class="stock-info-row">
                <svg width="6" height="6" viewBox="0 0 6 6"><circle cx="3" cy="3" r="3" fill="${dots[status]}"/></svg>
                <span class="stock-info-text ${colors[status]}">${labels[status]}</span>
            </div>`;
        }
        function stockBadgeHTML(p) {
            const total = totalStock(p);
            if (total === 0) return `<div class="stock-badge out-stock">Esgotado</div>`;
            if (total <= 5) return `<div class="stock-badge low-stock">Últimas ${total}</div>`;
            return `<div class="stock-badge in-stock">Em stock</div>`;
        }
        /* ════════════════════════════════════════
           RENDER PRODUCTS
        ════════════════════════════════════════ */
        function renderProducts(data = productsDB) {
            const list = document.getElementById("product-list");
            if (data.length === 0) {
                list.innerHTML = `<div style="grid-column:1/-1;padding:6rem 0;text-align:center;opacity:0.08;">
                    <p class="font-heavy" style="font-size:2rem;font-style:italic;text-transform:uppercase;">Vazio</p>
                </div>`;
                return;
            }
            list.innerHTML = data.map(p => {
                const idx = productsDB.indexOf(p);
                const total = totalStock(p);
                const isOOS = total === 0;
                const hasSizes = p.sizes && Object.keys(p.sizes).length > 0;
                const isOneSize = hasSizes && Object.keys(p.sizes).length === 1 && Object.keys(p.sizes)[0] === 'ONE SIZE';
                // Botão: se tiver mais de um tamanho, pede selecção; senão, activa directo
                const btnDisabled = (!isOneSize && hasSizes) ? 'disabled' : '';
                const btnClass    = (!isOneSize && hasSizes) ? 'needs-size' : '';
                const btnLabel    = isOOS ? 'Esgotado' : (!isOneSize && hasSizes) ? 'Selecciona o tamanho' : 'Adicionar à Bag';
                return `
                <div class="product-card" data-aos="fade-up">
                    <div class="card-image-wrap">
                        <img src="${p.image}" alt="${p.name}" loading="lazy">
                        <div class="card-image-overlay"></div>
                        ${stockBadgeHTML(p)}
                    </div>
                    <div class="card-body">
                        <div class="card-meta">
                            <div>
                                <p class="card-name">${p.name}</p>
                                <p class="card-desc">${p.desc}</p>
                            </div>
                            <span class="card-price">${p.price} MT</span>
                        </div>
                        ${renderStockInfo(p)}
                        ${renderSizePills(p, idx)}
                        <button class="btn-add ${btnClass}"
                                data-add-btn="${idx}"
                                ${isOOS ? 'disabled' : btnDisabled}
                                onclick="addToBag(${idx}, this)">
                            <span>${btnLabel}</span>
                        </button>
                    </div>
                </div>`;
            }).join("");
            if (typeof AOS !== 'undefined') AOS.refresh();
        }
        /* ════════════════════════════════════════
           BAG ACTIONS
        ════════════════════════════════════════ */
        function addToBag(index, btn) {
            const p = productsDB[index];
            if (!p) return;
            // Descobre tamanho seleccionado
            const selectedPill = document.querySelector(`#sizes-${index} .size-pill.selected`);
            const isOneSize = p.sizes && Object.keys(p.sizes).length === 1 && Object.keys(p.sizes)[0] === 'ONE SIZE';
            const size = isOneSize ? 'ONE SIZE' : (selectedPill ? selectedPill.dataset.size : null);
            if (!size && !isOneSize) {
                // Sacudir o botão
                btn.style.transform = 'scale(0.97)';
                setTimeout(() => btn.style.transform = '', 150);
                return;
            }
            bag.push({ ...p, selectedSize: size });
            localStorage.setItem("nexus_bag", JSON.stringify(bag));
            document.getElementById("cart-dot").style.display = "block";
            // Flash card
            const card = btn?.closest('.product-card');
            if (card) { card.classList.add('flash'); setTimeout(() => card.classList.remove('flash'), 500); }
            // Reset size selection
            if (selectedPill) {
                selectedPill.classList.remove('selected');
                btn.disabled = true;
                btn.classList.add('needs-size');
                btn.querySelector('span').textContent = 'Selecciona o tamanho';
            }
            updateCartUI();
        }
        function removeFromBag(i) {
            bag.splice(i, 1);
            localStorage.setItem("nexus_bag", JSON.stringify(bag));
            updateCartUI();
            if (bag.length === 0) document.getElementById("cart-dot").style.display = "none";
        }
        /* ════════════════════════════════════════
           CART MODAL
        ════════════════════════════════════════ */
        function toggleCart() {
            const modal = document.getElementById("modal-cart");
            const isHidden = modal.style.display === "none" || modal.style.display === "";
            modal.style.display = isHidden ? "flex" : "none";
            updateCartUI();
        }
        function updateCartUI() {
            const container  = document.getElementById("cartItems");
            const totalRow   = document.getElementById("cart-total-row");
            const totalVal   = document.getElementById("cart-total-val");
            if (bag.length === 0) {
                container.innerHTML = `<div class="empty-state">Sua bag está vazia</div>`;
                totalRow.style.display = "none";
                return;
            }
            let total = 0;
            container.innerHTML = bag.map((item, i) => {
                const price = parseFloat(item.price.toString().replace(/\D/g,'')) || 0;
                total += price;
                const sizeTag = item.selectedSize ? `<p class="cart-item-size">Tamanho: ${item.selectedSize}</p>` : '';
                return `
                <div class="cart-item">
                    <div>
                        <p class="cart-item-name">${item.name}</p>
                        ${sizeTag}
                        <p class="cart-item-price">${item.price} MT</p>
                    </div>
                    <button class="btn-remove" onclick="removeFromBag(${i})">Remover</button>
                </div>`;
            }).join("");
            totalRow.style.display = "flex";
            totalVal.textContent = `${total} MT`;
        }
        /* ════════════════════════════════════════
           SEARCH
        ════════════════════════════════════════ */
        function searchProducts() {
            const term = document.getElementById("search-input").value.toLowerCase();
            const filtered = productsDB.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }
        /* ════════════════════════════════════════
           ORDER (WhatsApp) — inclui tamanho
        ════════════════════════════════════════ */
        function sendOrder() {
            const phone = document.getElementById("phone").value;
            const loc   = document.getElementById("location").value;
            if (bag.length === 0) { alert("Sua bag está vazia!"); return; }
            if (!phone || phone.trim().length < 5) { alert("Insira o seu contacto."); return; }
            let msg = `PEDIDO - NEXUS SIVE\n_______________________________\n\n`;
            let total = 0;
            bag.forEach((item, i) => {
                const size = item.selectedSize ? ` [${item.selectedSize}]` : '';
                msg += `${i+1}. ${item.name.toUpperCase()}${size} - ${item.price} MT\n`;
                total += parseFloat(item.price.toString().replace(/\D/g,'')) || 0;
            });
            msg += `_______________________________\n\n`;
            msg += `TOTAL: ${total} MT\n`;
            msg += `BAIRRO: ${loc.toUpperCase()}\n`;
            msg += `CONTACTO: ${phone}\n\n`;
            msg += `_Enviado pelo Marketplace Nexus_`;
            window.open(`https://wa.me/258879151175?text=${encodeURIComponent(msg)}`, '_blank');
        }
        /* ════════════════════════════════════════
           INTRO
        ════════════════════════════════════════ */
        function startIntro() {
            const slogan = "Small details, big differences.";
            let i = 0;
            const el = document.getElementById("typewriter");
            const timer = setInterval(() => {
                if (i < slogan.length) { el.textContent += slogan.charAt(i); i++; }
                else { clearInterval(timer); setTimeout(() => document.getElementById("intro-overlay").classList.add("hide"), 1200); }
            }, 50);
        }
        /* ════════════════════════════════════════
           INIT
        ════════════════════════════════════════ */
        window.onload = () => {
            startIntro();
            renderProducts();
            if (bag.length > 0) document.getElementById("cart-dot").style.display = "block";
        };
    </script>
</body>
</html>
